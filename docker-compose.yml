services:
  db:
    image: postgres:16-alpine
    container_name: reachpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reachpilot
      POSTGRES_USER: reachpilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reachpilot_dev_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reachpilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: reachpilot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  postgres_data:
  redis_data:
